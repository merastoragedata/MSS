 *   <bay-number> - <equipment-code>
 *   e.g. 402-89A (isolator), 402-89AE (its earth switch), 402-52 (CB, also
 *   tagged 402-CB), 402-CT (current transformer), 402-89B / 402-89BE
 *   (isolator + earth switch on the far side of the CB)
 *

 * portal's admin edit screens let you fix any of this later without a
 * redeploy, so nothing here is load-bearing/permanent:
 *   [CONFIRMED]  — read directly off the SLD at 400 DPI, unambiguous
 *   [PATTERN]    — same 89A/89B/52/CT/LA/CVT/WT template applied to a bay
 *                  of the same type elsewhere on the 400 kV yard
 *   [EXTENDED]   — 220 kV / 33 kV equivalents inferred by extending the
 *                  same "bay-code" convention; the 33 kV Station Transformer
 *                  bays (31xxx/32xxx tags) ARE confirmed from the legend,
 *                  everything else on 220 kV/33 kV is EXTENDED and most
 *                  likely to need your correction
 */

// ---- 400 kV bay-type equipment templates --------------------------------
const TPL_400_LINE = (b) => [ // [CONFIRMED] pattern from bays 404/407/410/413

  { code: `${b}-CVT`, label: "Capacitive Voltage Transformer" },

  { code: `${b}-89B`, label: "Isolator B (Diameter side)" },
];

  { code: `${b}-52`, label: "Circuit Breaker" },
  { code: `${b}-CT`, label: "Current Transformer" },

// ---- 33 kV yard -----------------------------------------------------------
// Station Transformer bays [CONFIRMED] — read directly off the 33 kV legend
// inset (STN TRANFO-01 uses the "31" prefix, STN TRANFO-02 the "32" prefix).
const TPL_33_STNTFR = (b, prefix) => [
  { code: `${prefix}HGF`, label: "HG Fuse" },
  { code: `${prefix}89T1`, label: "Isolator T1" },
  { code: `${prefix}89T2`, label: "Isolator T2" },
  { code: `${prefix}MCT1`, label: "Metering CT" },
  { code: `${prefix}MPT1`, label: "Metering PT" },
  { code: `${prefix}LA`, label: "Lightning Arrester" },
];

// [EXTENDED] — 33 kV line bay & bus sectionaliser bay; no direct legend read.
const TPL_33_LINE = (b) => [
  { code: `${b}-LA`, label: "Lightning Arrester" },
  { code: `${b}-89L`, label: "Line Isolator" },
  { code: `${b}-52`, label: "Circuit Breaker" },
  { code: `${b}-CT`, label: "Current Transformer" },
];

const TPL_33_BS = (b) => [
  { code: `${b}-89-1`, label: "Isolator — Section 1" },
  { code: `${b}-89-2`, label: "Isolator — Section 2" },
  { code: `${b}-52`, label: "Circuit Breaker" },
];

// ---------------------------------------------------------------------------
function equipmentForBay(bay) {
  switch (bay.type) {
    case "Line":
      return bay.voltage === "220" ? TPL_220_LINE(bay.id) : TPL_400_LINE(bay.id);
    case "Tie":
      return TPL_400_TIE(bay.id);
    case "Reactor":
      return TPL_400_REACTOR(bay.id);
    case "ICT-HV":
      return TPL_400_ICT_HV(bay.id);
    case "ICT-IV":
      return TPL_220_ICT_IV(bay.id);
    case "Future":
      return TPL_400_FUTURE(bay.id);
    case "BC":
      return TPL_220_BC(bay.id);
    case "TBC":
      return TPL_220_TBC(bay.id);
    case "StnTfr33":
      return TPL_33_STNTFR(bay.id, bay.id === "33-T1" ? "31" : "32");
    case "Line33":
      return TPL_33_LINE(bay.id);
    case "BS33":
      return TPL_33_BS(bay.id);
    default:
      return [];
  }
}

  <script>
/* =============================================================================
   WEATHER LAYER — fetches live conditions for Karjat (Open-Meteo, no API key)
   and paints rain / mist on #weatherCanvas accordingly. This is what makes
   "rain on-site = heavy rain on the website" actually true, not simulated.
   Falls back to a gentle default mist if the weather fetch fails (e.g. no
   network in this sandbox) so the site still looks alive.
   ========================================================================== */

const WeatherFX = {
  canvas: null, ctx: null, w: 0, h: 0,
  mode: "clear",       // clear | cloudy | fog | drizzle | rain | storm
  intensity: 0,         // 0..1
  drops: [],
  mistBlobs: [],
  raf: null,
};

function classifyWeatherCode(code) {
  if ([0, 1].includes(code)) return { mode: "clear", intensity: 0 };
  if ([2, 3].includes(code)) return { mode: "cloudy", intensity: 0.15 };
  if ([45, 48].includes(code)) return { mode: "fog", intensity: 0.5 };
  if ([51, 53, 55, 56, 57].includes(code)) return { mode: "drizzle", intensity: 0.35 };
  if ([61, 63, 80, 81].includes(code)) return { mode: "rain", intensity: 0.65 };
  if ([65, 66, 67, 82, 95, 96, 99].includes(code)) return { mode: "storm", intensity: 1 };
  return { mode: "cloudy", intensity: 0.15 };
}

async function fetchKarjatWeather() {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${CONFIG.LAT}&longitude=${CONFIG.LON}&current=temperature_2m,precipitation,weather_code&timezone=auto`;
    const res = await fetch(url);
    const data = await res.json();
    const code = data.current.weather_code;
    const temp = data.current.temperature_2m;
    const { mode, intensity } = classifyWeatherCode(code);
    return { mode, intensity, temp, ok: true };
  } catch (e) {
    return { mode: "cloudy", intensity: 0.15, temp: null, ok: false };
  }
}

function initWeather() {
  const canvas = document.getElementById("weatherCanvas");
  WeatherFX.canvas = canvas;
  WeatherFX.ctx = canvas.getContext("2d");
  resizeWeatherCanvas();
  window.addEventListener("resize", resizeWeatherCanvas);

  fetchKarjatWeather().then((w) => {
    WeatherFX.mode = w.mode;
    WeatherFX.intensity = w.intensity;
    seedParticles();
    updateWeatherBadge(w);
    loopWeather();
  });

  // refresh conditions every 15 min
  setInterval(async () => {
    const w = await fetchKarjatWeather();
    WeatherFX.mode = w.mode;
    WeatherFX.intensity = w.intensity;
    seedParticles();
    updateWeatherBadge(w);
  }, 15 * 60 * 1000);
}

function updateWeatherBadge(w) {
  const el = document.getElementById("weatherBadge");
  if (!el) return;
  const labels = { clear: "Clear", cloudy: "Cloudy", fog: "Misty ridge", drizzle: "Light rain", rain: "Rain", storm: "Heavy rain" };
  el.innerHTML = `<span class="dot"></span>Karjat · ${labels[w.mode] || "—"}${w.temp != null ? ` · ${Math.round(w.temp)}°C` : ""}`;
}

function resizeWeatherCanvas() {
  const c = WeatherFX.canvas; if (!c) return;
  WeatherFX.w = c.width = window.innerWidth;
  WeatherFX.h = c.height = window.innerHeight;
}

function seedParticles() {
  const { mode, intensity, w, h } = { ...WeatherFX, w: WeatherFX.w, h: WeatherFX.h };
  const dropCount = mode === "storm" ? 220 : mode === "rain" ? 140 : mode === "drizzle" ? 60 : 0;
  WeatherFX.drops = Array.from({ length: dropCount }, () => ({
    x: Math.random() * w,
    y: Math.random() * h,
    len: 10 + Math.random() * (mode === "storm" ? 22 : 14),
    speed: (mode === "storm" ? 11 : mode === "rain" ? 8 : 5) + Math.random() * 4,
    drift: mode === "storm" ? 2.4 : 1.1,
  }));
  const mistCount = (mode === "fog" ? 10 : mode === "cloudy" ? 4 : 2);
  WeatherFX.mistBlobs = Array.from({ length: mistCount }, () => ({
    x: Math.random() * w, y: h * (0.55 + Math.random() * 0.4),
    r: 180 + Math.random() * 220, speed: 0.15 + Math.random() * 0.2,
  }));
}

function loopWeather() {
  const { ctx, w, h, mode, intensity } = WeatherFX;
  ctx.clearRect(0, 0, w, h);

  // drifting mist (present in fog/cloudy/rain — a wet hill station is rarely bone-dry-clear)
  WeatherFX.mistBlobs.forEach((m) => {
    m.x += m.speed;
    if (m.x - m.r > w) m.x = -m.r;
    const grad = ctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, m.r);
    grad.addColorStop(0, `rgba(150,190,175,${0.05 + intensity * 0.04})`);
    grad.addColorStop(1, "rgba(150,190,175,0)");
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2); ctx.fill();
  });

  // rain streaks
  if (WeatherFX.drops.length) {
    ctx.strokeStyle = mode === "storm" ? "rgba(180,215,230,0.55)" : "rgba(180,215,230,0.38)";
    ctx.lineWidth = mode === "storm" ? 1.6 : 1.1;
    WeatherFX.drops.forEach((d) => {
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x - d.drift, d.y + d.len);
      ctx.stroke();
      d.y += d.speed; d.x -= d.drift * 0.4;
      if (d.y > h) { d.y = -d.len; d.x = Math.random() * w; }
    });
  }

  WeatherFX.raf = requestAnimationFrame(loopWeather);
}

  </script>

const REMARK_POOLS = {
  general: ["Found OK. Checked and recorded in register.", "Checked — no abnormality observed.", "Inspected. Parameters within normal range.", "Physically verified — in order."],
  cleaning: ["Cleaned thoroughly.", "Cleaning done.", "Cleaned — OK.", "Dust/dirt removed, cleaned."],
  tightness: ["Checked for tightness — OK.", "Tightening done.", "Connections tightened & verified.", "Checked, tight."],
  leakage: ["No leakage found.", "No leakage observed on inspection.", "Checked — leak-free.", "No leakage on bushings/joints."],

};

  if (c.includes("52") || c.includes("cb")) return "tightness";

  if (c.includes("89")) return "pressure";
  return "general";

function pickRemark(code) {
  const arr = REMARK_POOLS[poolFor(code)];
  return arr[Math.floor(Math.random() * arr.length)];

// ---------------------------------------------------------------------------

// ---------------------------------------------------------------------------
const DemoDB = {
  key: "karjat_portal_demo_v1",
  read() {
    try { return JSON.parse(localStorage.getItem(this.key)) || { bays: {}, records: {}, prefillUsers: [], sld: {} }; }
    catch { return { bays: {}, records: {}, prefillUsers: [], sld: {} }; }
  },
  write(db) { localStorage.setItem(this.key, JSON.stringify(db)); },
};

async function apiGet(action, params = {}) {
  if (DEMO_MODE) return demoGet(action, params);
  const qs = new URLSearchParams({ action, ...params }).toString();
  const res = await fetch(`${CONFIG.API_URL}?${qs}`);
  return res.json();
}
async function apiPost(action, body = {}) {
  if (DEMO_MODE) return demoPost(action, body);
  const res = await fetch(CONFIG.API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" }, // avoids CORS preflight on Apps Script
    body: JSON.stringify({ action, ...body }),
  });
  return res.json();
}

function demoGet(action, params) {
  const db = DemoDB.read();
  if (action === "getBays") {
    const bays = BAY_MASTER.map((b) => ({ ...b, ...(db.bays[b.id] || {}) }));
    return { bays };
  }
  if (action === "getMaintenance") return { records: db.records[params.bayId] || [] };
  if (action === "getPrefillUsers") return { users: db.prefillUsers };
  if (action === "getSLD") return { drawing: db.sld[params.bayId] || null };
  return {};
}
function demoPost(action, body) {
  const db = DemoDB.read();
  if (action === "updateBayStatus") {
    db.bays[body.bayId] = { ...(db.bays[body.bayId] || {}), status: body.status };
  } else if (action === "renameBay") {
    db.bays[body.bayId] = { ...(db.bays[body.bayId] || {}), name: body.name };
  } else if (action === "logMaintenance") {
    const gid = body.groupId || crypto.randomUUID();
    db.records[body.bayId] = db.records[body.bayId] || [];
    db.records[body.bayId].push({ ...body.entries, GroupID: gid, CreatedAt: new Date().toISOString() });
  } else if (action === "setPrefillUsers") {
    db.prefillUsers = body.users;
  } else if (action === "saveSLD") {
    db.sld[body.bayId] = body.drawing;
  }
  DemoDB.write(db);
  return { ok: true };
}

// ---------------------------------------------------------------------------
// 4) DATE / DUE-DATE HELPERS
// ---------------------------------------------------------------------------
function currentFY(d = new Date()) {
  const y = d.getFullYear(), m = d.getMonth() + 1;
  return m >= 4 ? `FY ${y}-${String(y + 1).slice(2)}` : `FY ${y - 1}-${String(y).slice(2)}`;
}
function addMonths(date, n) { const d = new Date(date); d.setMonth(d.getMonth() + n); return d; }
function daysBetween(a, b) { return Math.round((b - a) / 86400000); }

const CYCLE_MONTHS = { Monthly: 1, Quarterly: 3, Annual: 12 };

// returns { lastDate, nextDue, tone: 'ok'|'warn'|'overdue', daysLeft }
function dueStatus(category, records) {
  const list = records.filter((r) => r.Category === category).sort((a, b) => new Date(b.Date) - new Date(a.Date));
  const last = list[0];
  if (!last) return { lastDate: null, nextDue: null, tone: "overdue", label: "Never logged" };
  const nextDue = addMonths(last.Date, CYCLE_MONTHS[category]);
  const daysLeft = daysBetween(new Date(), nextDue);
  let tone;
  if (category === "Monthly") {
    tone = daysLeft < 0 ? "overdue" : daysLeft <= 14 ? "warn" : "ok";
  } else {
    tone = daysLeft < 0 ? "overdue" : daysLeft <= 60 ? "warn" : "ok";
  }
  return { lastDate: last.Date, nextDue: nextDue.toISOString().slice(0, 10), tone, daysLeft };
}
function duePillHTML(status) {
  const label = status.lastDate
    ? `Last: ${status.lastDate} · Next due: ${status.nextDue}`
    : "Never logged — due now";
  return `<span class="due-pill ${status.tone}"><span class="dot"></span>${label}</span>`;
}

function setupSLDCanvas() {
  const canvas = document.getElementById("sldCanvas");
  const ctx = canvas.getContext("2d");
  ctx.strokeStyle = "#3FBFA6"; ctx.lineWidth = 2; ctx.lineCap = "round";
  let drawing = false, last = null;
  function pos(e) {
    const r = canvas.getBoundingClientRect();
    const p = e.touches ? e.touches[0] : e;
    return { x: (p.clientX - r.left) * (canvas.width / r.width), y: (p.clientY - r.top) * (canvas.height / r.height) };
  }
  function start(e) { drawing = true; last = pos(e); }
  function move(e) {
    if (!drawing) return;
    const p = pos(e);
    ctx.beginPath(); ctx.moveTo(last.x, last.y); ctx.lineTo(p.x, p.y); ctx.stroke();
    last = p; e.preventDefault();
  }
  function end() { drawing = false; }
  canvas.addEventListener("mousedown", start); canvas.addEventListener("mousemove", move); window.addEventListener("mouseup", end);
  canvas.addEventListener("touchstart", start); canvas.addEventListener("touchmove", move); canvas.addEventListener("touchend", end);
}
function clearSLDCanvas() {
  const canvas = document.getElementById("sldCanvas");
  canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height);
}
async function saveSLDCanvas(bayId) {
  const canvas = document.getElementById("sldCanvas");
  const dataUrl = canvas.toDataURL("image/png");
  await apiPost("saveSLD", { bayId, drawing: { dataUrl }, user: State.currentUser });
  closeModal();
  renderBayDetail(bayId);
}

// ADMIN

function renderAdmin() {
  app.innerHTML = `
    <h1 class="page-title">Admin</h1>
    <div class="page-sub">Control who can use auto-prefill remarks when logging maintenance. The top-bar toggle simulates admin login for now — real auth arrives with backend deployment.</div>
    ${busbarSVG()}
    <div class="card" style="max-width:460px">
      <div style="font-size:13px;font-weight:600;margin-bottom:10px">Users allowed to use prefill</div>
      <div id="prefillList" style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px">
        ${State.prefillUsers.length===0 ? `<div style="color:var(--dim);font-size:12px">No users added yet.</div>` :
          State.prefillUsers.map(u => `
            <div style="display:flex;justify-content:space-between;align-items:center;background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:6px 10px">
              <span style="font-size:12.5px">${u}</span>
              <button class="btn danger sm" onclick="removePrefillUser('${u}')">remove</button>
            </div>`).join("")}
      </div>
      <div style="display:flex;gap:6px">
        <input class="in" id="newPrefillUser" placeholder="User name / ID"/>
        <button class="btn" onclick="addPrefillUser()">Add</button>
      </div>
    </div>
  `;
}
async function addPrefillUser() {
  const input = document.getElementById("newPrefillUser");
  const v = input.value.trim();
  if (!v) return;
  State.prefillUsers.push(v);
  await apiPost("setPrefillUsers", { users: State.prefillUsers });
  renderAdmin();
}
async function removePrefillUser(u) {
  State.prefillUsers = State.prefillUsers.filter((x) => x !== u);
  await apiPost("setPrefillUsers", { users: State.prefillUsers });
  renderAdmin();
}

function renderStub(k) {
  const titles = { gallery: "Photo Gallery", battery: "Battery Set", dg: "DG Set", other: "Other Maintenance" };
  app.innerHTML = `<h1 class="page-title">${titles[k]}</h1>${busbarSVG()}<div class="card"><div class="empty-note">Coming in a later phase.</div></div>`;
}

document.getElementById("adminSwitch").addEventListener("click", () => { State.isAdmin = !State.isAdmin; render(); });

(async function boot() {
  await loadAll();
  render();
  initWeather();
